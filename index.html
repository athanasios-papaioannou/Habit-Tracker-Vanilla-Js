<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Habit Tracker | Vanilla JavaScript Habit Tracking Application</title>

  <link rel="stylesheet" href="style.css" />

  <meta
    name="description"
    content="Habit Tracker is a Vanilla JavaScript application designed to help users build consistent daily habits. It features streak tracking, daily progress monitoring, localStorage persistence, dark mode, and an intuitive user interface."
  />

  <meta name="author" content="Athanasios Papaioannou" />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#54a33a" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />

  <meta
    property="og:url"
    content="https://habit-tracker.athanasiospapaioannou.gr/"
  />

  <meta
    property="og:title"
    content="Habit Tracker | Vanilla JavaScript Habit Tracking Application"
  />

  <meta
    property="og:description"
    content="A Vanilla JavaScript habit tracking application featuring daily streak tracking, progress monitoring, localStorage persistence, dark mode and a clean user experience."
  />

  <meta
    property="og:image"
    content="https://habit-tracker.athanasiospapaioannou.gr/og-cover.jpg"
  />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta
    name="twitter:title"
    content="Habit Tracker | Vanilla JavaScript Habit Tracking Application"
  />

  <meta
    name="twitter:description"
    content="A Vanilla JavaScript habit tracking application featuring daily streak tracking, progress monitoring, localStorage persistence, dark mode and a clean user experience."
  />

  <meta
    name="twitter:image"
    content="https://habit-tracker.athanasiospapaioannou.gr/og-cover.jpg"
  />
</head>
<body>

  <div class="container">
	<div class="top-bar">
        <div class="version-badge">v1.2</div>
        <button id="darkModeToggle">🌙 Dark Mode</button>
    </div>

    <img class="logo" id="appLogo" src="habit-tracker-logo.png" alt="Habit Tracker Logo">

    <div class="input-section">
      <input type="text" id="habitInput" placeholder="Add a new habit...">
      <button id="addBtn">Add</button>
    </div>
    <p id="progressText"></p>
    <div class="habits-list" id="habitsList">
      <!-- Habits θα μπαίνουν εδώ -->
    </div>
    <p class="streak-info">
      🔥 Streak: consecutive days you successfully completed the habit
    </p>
    <br/>
    <div class="clear-button">
      <button id="clearBtn">Clear All</button>
    </div>
    <footer class="app-footer">
      Habit Tracker v1.2 <br/>
      Made with ❤️ by Athanasios Papaioannou
    </footer>
  </div>
<script src="script.js"></script>
</body>
</html>
